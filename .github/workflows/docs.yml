name: docs

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check local Markdown links
        run: python scripts/check_markdown_links.py
      - name: Check delivery graph example
        run: python scripts/check_delivery_graph.py examples/delivery-graph.json --ready
      - name: Check delivery graph failure modes
        run: python -m unittest tests/test_check_delivery_graph.py
